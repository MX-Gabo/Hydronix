name: Hydronix APK

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-22.04

```
steps:

  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Set up Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "17"

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install buildozer cython

  - name: Install system packages
    run: |
      sudo apt update
      sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget

  - name: Install Android SDK
    run: |
      mkdir -p $HOME/android-sdk/cmdline-tools
      cd $HOME/android-sdk/cmdline-tools

      wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip

      unzip sdk.zip

      mv cmdline-tools latest

  - name: Set Android environment
    run: |
      echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
      echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
      echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
      echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

  - name: Accept Android licenses
    run: |
      yes | sdkmanager --licenses

  - name: Install Android SDK components
    run: |
      sdkmanager "platform-tools"
      sdkmanager "platforms;android-33"
      sdkmanager "build-tools;33.0.0"

  - name: Build APK
    run: |
      buildozer android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: Hydronix-APK
      path: bin/*.apk
```
