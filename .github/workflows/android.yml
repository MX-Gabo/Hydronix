name: Hydronix APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev wget \
            build-essential libltdl-dev

      # Instalar el SDK DIRECTAMENTE donde buildozer lo busca
      - name: Install Android SDK into buildozer cache
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d "$SDK_DIR/cmdline-tools"
          mv "$SDK_DIR/cmdline-tools/cmdline-tools" "$SDK_DIR/cmdline-tools/latest"

          # Crear el enlace que buildozer busca en la ruta legacy
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/avdmanager"  "$SDK_DIR/tools/bin/avdmanager"

      - name: Set Android environment
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          echo "ANDROID_HOME=$SDK_DIR"      >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_DIR"  >> $GITHUB_ENV
          echo "$SDK_DIR/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$SDK_DIR/platform-tools"           >> $GITHUB_PATH

      - name: Accept Android licenses
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          yes | "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install Android SDK components
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Patch buildozer.spec
        run: |
          sed -i 's/^#*\s*android\.api\s*=.*/android.api = 33/'                                     buildozer.spec
          sed -i 's/^#*\s*android\.minapi\s*=.*/android.minapi = 21/'                               buildozer.spec
          sed -i 's/^#*\s*android\.build_tools_version\s*=.*/android.build_tools_version = 33.0.2/' buildozer.spec
          sed -i 's/^#*\s*android\.ndk_version\s*=.*/android.ndk_version = 28c/'                    buildozer.spec

          # Decirle a buildozer exactamente donde esta el SDK
          if grep -q "android.sdk_path" buildozer.spec; then
            sed -i "s|^#*\s*android\.sdk_path\s*=.*|android.sdk_path = $HOME/.buildozer/android/platform/android-sdk|" buildozer.spec
          else
            echo "android.sdk_path = $HOME/.buildozer/android/platform/android-sdk" >> buildozer.spec
          fi

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hydronix-APK
          path: bin/*.apk

      - name: Upload build log si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log