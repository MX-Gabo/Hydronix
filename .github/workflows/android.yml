name: Hydronix APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev wget \
            build-essential libltdl-dev

      # ✅ CACHÉ — guarda todo lo que buildozer descarga/compila
      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ✅ CACHÉ — guarda el gradle de Android
      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install Android SDK into buildozer cache
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"

          # Solo instalar si no existe en caché
          if [ ! -d "$SDK_DIR/cmdline-tools/latest" ]; then
            mkdir -p "$SDK_DIR/cmdline-tools"
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/sdk.zip
            unzip -q /tmp/sdk.zip -d "$SDK_DIR/cmdline-tools"
            mv "$SDK_DIR/cmdline-tools/cmdline-tools" "$SDK_DIR/cmdline-tools/latest"
          fi

          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/avdmanager"  "$SDK_DIR/tools/bin/avdmanager"

      - name: Set Android environment
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          echo "ANDROID_HOME=$SDK_DIR"             >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_DIR"         >> $GITHUB_ENV
          echo "$SDK_DIR/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$SDK_DIR/platform-tools"           >> $GITHUB_PATH

      - name: Accept Android licenses
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          yes | "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install Android SDK components
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Verify buildozer.spec values
        run: |
          if grep -q "android.sdk_path" buildozer.spec; then
            sed -i "s|^#*\s*android\.sdk_path\s*=.*|android.sdk_path = $HOME/.buildozer/android/platform/android-sdk|" buildozer.spec
          else
            echo "android.sdk_path = $HOME/.buildozer/android/platform/android-sdk" >> buildozer.spec
          fi

      - name: Build APK
        run: buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hydronix-APK
          path: bin/*.apk

      - name: Upload build log si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log